<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medos Dainų Viktorina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Fredoka+One&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ─────────────────────────────────────── */
    :root {
      --bg:      #0a0a1a;
      --s1:      #12122a;
      --s2:      #1a1a38;
      --pink:    #ff006e;
      --purple:  #8338ec;
      --cyan:    #06d6d6;
      --orange:  #ff8c00;
      --lime:    #a8ff3e;
      --green:   #00c896;
      --red:     #ff3a5c;
      --gold:    #ffd60a;
      --text:    #f0eeff;
      --muted:   #7a7a9a;
      --border:  #2a2a50;
      --r:       16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(160deg, #1e0540 0%, #0d0d2e 35%, #001833 65%, #021a1a 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* vivid colour blobs */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 12% 18%,  rgba(131,56,236,.55) 0%, transparent 60%),
        radial-gradient(ellipse 65% 55% at 88% 78%,  rgba(255,0,110,.45) 0%, transparent 60%),
        radial-gradient(ellipse 55% 48% at 82% 12%,  rgba(6,214,214,.38) 0%, transparent 60%),
        radial-gradient(ellipse 50% 42% at 10% 88%,  rgba(255,140,0,.32) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 50% 50%,  rgba(168,255,62,.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body > * { position: relative; z-index: 1; }

    /* floating musical notes */
    .bg-decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-decor span {
      position: absolute;
      bottom: -80px;
      left: var(--x);
      font-size: var(--s);
      opacity: 0;
      animation: floatNote var(--dur, 9s) linear var(--d) infinite;
      user-select: none;
    }
    @keyframes floatNote {
      0%   { transform: translateY(0) rotate(0deg)   scale(1);   opacity: 0; }
      8%   { opacity: .55; }
      50%  { transform: translateY(-55vh) rotate(180deg) scale(1.1); opacity: .4; }
      92%  { opacity: .3; }
      100% { transform: translateY(-115vh) rotate(360deg) scale(.9); opacity: 0; }
    }
    @keyframes floatText {
      0%   { transform: translateY(0)      scale(1);    opacity: 0; }
      8%   { opacity: 1; }
      90%  { opacity: .85; }
      100% { transform: translateY(-110vh) scale(1.05); opacity: 0; }
    }

    /* ── SCREENS ────────────────────────────────────── */
    .screen { display: none; }
    .screen.active {
      display: block;
      animation: fadeUp .4s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── SHARED ─────────────────────────────────────── */
    .card {
      background: rgba(18,18,42,.85);
      border: 1.5px solid rgba(131,56,236,.35);
      border-radius: var(--r);
      padding: 1.4rem 1.5rem;
      margin-bottom: 1.1rem;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
    }
    .card-label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--cyan);
      margin-bottom: .8rem;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      background: rgba(10,10,26,.8);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: .65rem .9rem;
      font-size: .95rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(131,56,236,.25);
    }

    /* ── BUTTONS ────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      border: none;
      border-radius: 12px;
      font-family: 'Fredoka One', cursive;
      font-weight: 400;
      letter-spacing: .03em;
      cursor: pointer;
      transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s, filter .15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.03);
      filter: brightness(1.12);
    }
    .btn:active:not(:disabled) { transform: translateY(0) scale(.98); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }

    .btn-accent {
      background: linear-gradient(135deg, var(--purple), #6a00f4);
      color: #fff;
      box-shadow: 0 4px 18px rgba(131,56,236,.45);
    }
    .btn-accent:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(131,56,236,.65); }

    .btn-ghost {
      background: rgba(26,26,56,.9);
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-green {
      background: linear-gradient(135deg, #00a87a, var(--green));
      color: #fff;
      box-shadow: 0 4px 18px rgba(0,200,150,.4);
    }
    .btn-green:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(0,200,150,.6); }

    .btn-red {
      background: linear-gradient(135deg, #cc0033, var(--red));
      color: #fff;
      box-shadow: 0 4px 18px rgba(255,58,92,.4);
    }
    .btn-red:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(255,58,92,.6); }

    .btn-cyan {
      background: linear-gradient(135deg, #0096aa, var(--cyan));
      color: #0a0a1a;
      box-shadow: 0 4px 18px rgba(6,214,214,.4);
    }
    .btn-cyan:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(6,214,214,.6); }

    .btn-sm  { padding: .35rem .8rem;  font-size: .85rem; border-radius: 8px; }
    .btn-md  { padding: .65rem 1.3rem; font-size: 1rem; }
    .btn-lg  { padding: 1rem 1.4rem;   font-size: 1.05rem; width: 100%; border-radius: 14px; }
    .btn-full { width: 100%; }

    /* ── SETUP ──────────────────────────────────────── */
    #setup {
      max-width: 540px;
      margin: 0 auto;
      padding: 2.5rem 1rem 5rem;
    }
    .logo { text-align: center; margin-bottom: 2.5rem; }
    .logo h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.8rem;
      font-weight: 400;
      background: linear-gradient(90deg, #ff006e, #8338ec, #06d6d6, #ff8c00, #a8ff3e, #ff006e);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbowShift 4s linear infinite;
      text-shadow: none;
      filter: drop-shadow(0 2px 12px rgba(131,56,236,.4));
    }
    @keyframes rainbowShift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    .logo p {
      color: var(--muted);
      margin-top: .4rem;
      font-size: .95rem;
      letter-spacing: .02em;
    }

    .add-row { display: flex; gap: .5rem; margin-bottom: .75rem; }
    .add-row input { flex: 1; }

    .player-list { display: flex; flex-direction: column; gap: .4rem; min-height: 1rem; }
    .player-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, rgba(131,56,236,.2), rgba(6,214,214,.15));
      border: 1.5px solid rgba(131,56,236,.4);
      border-radius: 12px;
      padding: .5rem .85rem;
      font-size: .9rem;
      font-weight: 600;
      animation: popIn .25s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    .chip-name { flex: 1; }
    .chip-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: .1rem .3rem;
      border-radius: 5px;
      transition: color .15s, transform .15s;
      font-family: inherit;
    }
    .chip-remove:hover { color: var(--red); transform: rotate(15deg) scale(1.2); }

    .winscore-row { display: flex; align-items: center; gap: 1rem; }
    .winscore-row label { flex: 1; font-size: .9rem; color: var(--muted); }
    .winscore-row input { width: 80px; text-align: center; }

    .songs-note { text-align:center; font-size:.8rem; color:var(--muted); margin-top:.75rem; }

    /* ── GAME ───────────────────────────────────────── */
    #game.active { display: flex; flex-direction: column; min-height: 100vh; }
    .game-wrap {
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }

    /* top bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
    }
    .turn-label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: .02em;
    }
    .turn-label .pname {
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(6,214,214,.6);
    }
    .round-pill {
      background: linear-gradient(135deg, rgba(131,56,236,.3), rgba(6,214,214,.2));
      border: 1.5px solid rgba(131,56,236,.5);
      border-radius: 99px;
      padding: .3rem .95rem;
      font-size: .78rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    /* scoreboard */
    .sb {
      background: rgba(18,18,42,.85);
      border: 1.5px solid rgba(131,56,236,.3);
      border-radius: var(--r);
      padding: .9rem 1.1rem;
      backdrop-filter: blur(8px);
    }
    .sb-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--orange);
      margin-bottom: .6rem;
    }
    .sb-rows { display: flex; flex-direction: column; gap: .35rem; }
    .sb-row {
      display: flex;
      align-items: center;
      gap: .55rem;
      padding: .4rem .7rem;
      border-radius: 10px;
      border: 1.5px solid transparent;
      transition: background .25s, border-color .25s;
    }
    .sb-row.is-leader {
      background: rgba(255,214,10,.1);
      border-color: rgba(255,214,10,.3);
    }
    .sb-row.is-active {
      background: rgba(131,56,236,.18);
      border-color: rgba(131,56,236,.45);
    }
    .sb-row.is-leader.is-active {
      background: rgba(131,56,236,.2);
      border-color: rgba(131,56,236,.5);
    }
    .sb-rank { font-size: .75rem; color: var(--muted); width: 18px; text-align: center; flex-shrink: 0; }
    .sb-name { flex: 1; font-size: .88rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sb-pts {
      font-family: 'Fredoka One', cursive;
      font-size: .95rem;
      background: rgba(26,26,56,.9);
      border-radius: 99px;
      min-width: 34px;
      text-align: center;
      padding: .12rem .55rem;
      flex-shrink: 0;
      transition: background .25s, color .25s;
    }
    .sb-row.is-leader .sb-pts { background: var(--gold); color: #111; }
    .sb-row.is-active .sb-pts { background: var(--purple); color: #fff; }
    .sb-row.is-leader.is-active .sb-pts { background: var(--purple); color: #fff; }
    @keyframes bump { 0%,100%{transform:scale(1)} 40%{transform:scale(1.5) rotate(-5deg)} 60%{transform:scale(1.3) rotate(3deg)} }
    .bumping { animation: bump .5s cubic-bezier(.34,1.56,.64,1); }

    /* video */
    .video-wrap {
      position: relative;
      background: #000;
      border-radius: var(--r);
      overflow: hidden;
      border: 2px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 0 0 2px rgba(131,56,236,.6),
        0 0 30px rgba(131,56,236,.3),
        0 0 60px rgba(6,214,214,.15);
    }
    .video-ratio { position: relative; padding-bottom: 56.25%; }
    .video-ratio > * {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .video-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: .9rem;
    }

    /* timer */
    .timer-wrap {
      text-align: center;
      padding: .6rem .4rem;
      display: none;
      background: rgba(18,18,42,.7);
      border-radius: var(--r);
      border: 1.5px solid rgba(131,56,236,.3);
    }
    .timer-lbl {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--cyan);
      margin-bottom: .2rem;
    }
    .timer-num {
      font-family: 'Fredoka One', cursive;
      font-size: 4.5rem;
      line-height: 1;
      transition: color .25s;
    }
    .timer-num.t-go     { color: var(--lime); text-shadow: 0 0 20px rgba(168,255,62,.6); }
    .timer-num.t-soon   { color: var(--orange); text-shadow: 0 0 20px rgba(255,140,0,.6); animation: pulse .6s ease infinite alternate; }
    .timer-num.t-urgent { color: var(--red); text-shadow: 0 0 25px rgba(255,58,92,.8); animation: shakeNum .25s ease infinite; }
    .timer-num.t-done   { color: var(--muted); }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
    @keyframes shakeNum {
      0%,100% { transform: translateX(0) scale(1.05); }
      25%     { transform: translateX(-4px) scale(1.1); }
      75%     { transform: translateX(4px) scale(1.1); }
    }

    /* song reveal */
    .song-reveal {
      text-align: center;
      display: none;
      animation: fadeUp .35s ease both;
      padding: .3rem;
    }
    .song-reveal h3 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(6,214,214,.5);
    }
    .song-reveal p { color: var(--muted); font-size: .88rem; margin-top: .15rem; }

    /* lyrics */
    .lyrics-box {
      background: linear-gradient(135deg, rgba(18,18,42,.9), rgba(26,26,56,.9));
      border: 2px solid var(--purple);
      border-radius: var(--r);
      padding: 1.3rem 1.6rem;
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem;
      font-weight: 400;
      text-align: center;
      line-height: 1.6;
      display: none;
      animation: fadeUp .35s ease both;
      box-shadow: 0 0 20px rgba(131,56,236,.35), inset 0 0 20px rgba(131,56,236,.08);
      color: #fff;
      letter-spacing: .02em;
    }

    /* status */
    .status-bar {
      text-align: center;
      font-size: .88rem;
      color: var(--muted);
      min-height: 1.25rem;
      letter-spacing: .01em;
    }

    /* actions */
    .actions { display: flex; flex-direction: column; gap: .6rem; }
    .btn-pair { display: flex; gap: .6rem; }
    .btn-pair .btn { flex: 1; }
    .btn-center { display: flex; justify-content: center; }
    .btn-center .btn { max-width: 280px; }

    /* ── WINNER ─────────────────────────────────────── */
    #winner.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a0a3a 0%, #0a0a1a 70%);
      z-index: 60;
    }
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 59; }
    .winner-box {
      text-align: center;
      z-index: 61;
      padding: 2rem 1.5rem;
      max-width: 500px;
      width: 100%;
    }
    .winner-trophy {
      font-size: 6rem;
      display: block;
      margin-bottom: .5rem;
      animation: trophyBounce 1s cubic-bezier(.34,1.56,.64,1) both;
      filter: drop-shadow(0 0 20px rgba(255,214,10,.7));
    }
    @keyframes trophyBounce {
      from { opacity: 0; transform: scale(.3) rotate(-20deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .winner-box h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      font-weight: 400;
      background: linear-gradient(135deg, var(--gold), var(--orange), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .3rem;
      filter: drop-shadow(0 2px 12px rgba(255,214,10,.3));
    }
    .winner-sub {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 1.5rem;
    }

    .final-list { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1.8rem; }
    .final-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      background: rgba(18,18,42,.85);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: .65rem 1rem;
    }
    .final-row.is-winner {
      border-color: var(--gold);
      background: rgba(255,214,10,.08);
      box-shadow: 0 0 18px rgba(255,214,10,.2);
    }
    .final-rank { font-size: .78rem; color: var(--muted); width: 20px; flex-shrink: 0; }
    .final-name { flex: 1; font-weight: 600; text-align: left; }
    .final-pts {
      font-family: 'Fredoka One', cursive;
      font-weight: 400;
      font-size: 1.2rem;
      color: var(--purple);
    }
    .final-row.is-winner .final-pts { color: var(--gold); }

    /* ── VIDEO THUMBNAIL ───────────────────────────── */
    .video-thumb {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .video-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: rgba(0,0,0,.45);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: .65rem;
    }
    .video-play-btn {
      background: rgba(131,56,236,.92);
      border: none; border-radius: 50%;
      width: 72px; height: 72px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.9rem; color: #fff;
      transition: transform .15s, background .15s;
      box-shadow: 0 0 20px rgba(131,56,236,.6);
    }
    .video-play-btn:hover { background: var(--purple); transform: scale(1.12); }
    .video-open-tag {
      background: rgba(0,0,0,.6);
      border-radius: 99px;
      padding: .28rem .85rem;
      font-size: .76rem; font-weight: 600; color: var(--text);
    }

    /* ── MOBILE ─────────────────────────────────────── */
    @media (max-width: 580px) {
      .logo h1 { font-size: 2.1rem; }
      .winner-box h1 { font-size: 2.1rem; }
      .winner-trophy { font-size: 4rem; }
      .timer-num { font-size: 3.2rem; }
      .topbar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div class="bg-decor" aria-hidden="true">
  <span style="--x:4%;  --d:0s;   --s:1.9rem; --dur:10s">🎵</span>
  <span style="--x:13%; --d:1.5s; --s:1.2rem; --dur:8s">♪</span>
  <span style="--x:24%; --d:3s;   --s:2.2rem; --dur:11s">🎶</span>
  <span style="--x:38%; --d:.8s;  --s:1.5rem; --dur:9s">♫</span>
  <span style="--x:52%; --d:4.5s; --s:2rem;   --dur:12s">🎵</span>
  <span style="--x:63%; --d:2s;   --s:1rem;   --dur:7s">♪</span>
  <span style="--x:74%; --d:5.5s; --s:1.8rem; --dur:10s">🎶</span>
  <span style="--x:86%; --d:.4s;  --s:1.3rem; --dur:9s">♫</span>
  <span style="--x:32%; --d:6.5s; --s:1.1rem; --dur:8s">🎵</span>
  <span style="--x:78%; --d:3.5s; --s:2rem;   --dur:11s">♫</span>
  <span style="--x:47%; --d:7s;   --s:1.4rem; --dur:9s">🎶</span>
  <span style="--x:91%; --d:2.8s; --s:1.7rem; --dur:10s">🎵</span>
</div>

<!-- ════════════════ SETUP ════════════════ -->
<div id="setup" class="screen active">
  <div style="max-width:540px;margin:0 auto;padding:2.5rem 1rem 5rem">
    <div class="logo">
      <h1>🎵 Medos Dainų Viktorina</h1>
      <p>Ar atspėsi, kas dainuojama toliau?</p>
    </div>

    <div class="card">
      <div class="card-label">Pridėti žaidėjus (min. 2)</div>
      <div class="add-row">
        <input type="text" id="name-input" placeholder="Žaidėjo vardas…" maxlength="24" autocomplete="off" />
        <button class="btn btn-accent btn-md" onclick="addPlayer()">Pridėti</button>
      </div>
      <div class="player-list" id="player-list"></div>
    </div>

    <div class="card">
      <div class="card-label">Pergalės sąlyga</div>
      <div class="winscore-row">
        <label for="win-score">Pirmasis surinkęs šį balų skaičių laimi:</label>
        <input type="number" id="win-score" value="5" min="2" max="20" />
      </div>
    </div>

    <button class="btn btn-accent btn-lg btn-full" id="btn-start" onclick="startGame()" disabled>
      ▶ Pradėti žaidimą
    </button>
    <p class="songs-note" id="songs-note">Kraunamos dainos…</p>
  </div>
</div>

<!-- ════════════════ GAME ════════════════ -->
<div id="game" class="screen">
  <div class="game-wrap">

    <div class="topbar">
      <div class="turn-label" id="turn-label">…</div>
      <div class="round-pill" id="round-pill">Ratas 1</div>
    </div>

    <div class="sb">
      <div class="sb-label" id="sb-label">Rezultatai</div>
      <div class="sb-rows" id="sb-rows"></div>
    </div>

    <div class="video-wrap">
      <div class="video-ratio">
        <iframe id="yt-player" src="about:blank" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
    </div>

    <div class="timer-wrap" id="timer-wrap">
      <div class="timer-lbl">Laikas spėti!</div>
      <div class="timer-num t-go" id="timer-num">10</div>
    </div>

    <div class="song-reveal" id="song-reveal">
      <h3 id="song-title-el"></h3>
      <p id="song-artist-el"></p>
    </div>

    <div class="lyrics-box" id="lyrics-box"></div>

    <div class="status-bar" id="status-bar">Preparing…</div>

    <div class="actions">
      <!-- Step 1+2: replay / reveal -->
      <div class="btn-pair" id="row-rr">
        <button class="btn btn-ghost btn-lg" id="btn-replay" onclick="replayClip()" style="display:none">🔁 Pakartoti</button>
        <button class="btn btn-cyan  btn-lg" id="btn-reveal" onclick="revealAnswer()" style="display:none" disabled>🎵 Atskleisti atsakymą</button>
      </div>
      <!-- Step 4: judge -->
      <div class="btn-pair" id="row-judge" style="display:none">
        <button class="btn btn-green btn-lg" onclick="markAnswer(true)">Teisingai ✅</button>
        <button class="btn btn-red   btn-lg" onclick="markAnswer(false)">Neteisingai ❌</button>
      </div>
      <!-- Step 5: next -->
      <div class="btn-center" id="row-next" style="display:none">
        <button class="btn btn-accent btn-lg" onclick="nextRound()">Kitas ratas →</button>
      </div>
    </div>

  </div>
</div>

<!-- ════════════════ WINNER ════════════════ -->
<div id="winner" class="screen">
  <canvas id="confetti"></canvas>
  <div class="winner-box">
    <span class="winner-trophy">🏆</span>
    <h1 id="winner-name">Žaidėjas laimi!</h1>
    <p class="winner-sub">Nuostabus pasirodymas!</p>
    <div class="final-list" id="final-list"></div>
    <button class="btn btn-accent btn-lg" style="max-width:240px;margin:0 auto" onclick="playAgain()">Žaisti dar kartą</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════ */
const G = {
  songs:     [],
  players:   [],
  playerIdx: 0,
  songIdx:   0,
  round:     1,
  winScore:  5,
  phase:     'idle',
  timerVal:  10,
  timerIv:   null,
  confettiR: null,
};

/* ── PHASE CONFIG ──────────────────────── */
const PHASES = {
  idle:      { replay:false, reveal:false, judge:false, next:false, timer:false },
  clip:      { replay:true,  reveal:false, judge:false, next:false, timer:false },
  timer:     { replay:true,  reveal:true,  judge:false, next:false, timer:true  },
  revealing: { replay:false, reveal:false, judge:false, next:false, timer:false },
  judging:   { replay:false, reveal:false, judge:true,  next:false, timer:false },
  scored:    { replay:false, reveal:false, judge:false, next:true,  timer:false },
};

function setPhase(p) {
  G.phase = p;
  const cfg = PHASES[p] || PHASES.idle;

  if (cfg.timer) {
    startTimer();
  } else {
    clearTimer();
    el('timer-wrap').style.display = 'none';
  }

  setVis('btn-replay', cfg.replay);
  setVis('btn-reveal', cfg.reveal);
  el('btn-reveal').disabled = !cfg.reveal;
  setVis('row-judge', cfg.judge);
  setVis('row-next',  cfg.next);

  const msgs = {
    clip:      '🎵 Klausyk atidžiai…',
    timer:     '💭 Kokie dainos žodžiai toliau?',
    revealing: '▶ Klausyk teisingo atsakymo…',
    judging:   'Vedėjas: ar atsakymas teisingas?',
  };
  if (msgs[p]) setStatus(msgs[p]);
}

/* ══════════════════════════════════════════
   SETUP SCREEN
══════════════════════════════════════════ */
async function loadSongs() {
  try {
    const r = await fetch('songs.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    G.songs = await r.json();
    el('songs-note').textContent = `✅ ${G.songs.length} dainų paruošta`;
    checkStart();
  } catch (e) {
    el('songs-note').textContent = `⚠️ Nepavyko įkelti songs.json — įsitikinkite, kad veikia Live Server (${e.message})`;
  }
}

el('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

function addPlayer() {
  const inp = el('name-input');
  const name = inp.value.trim();
  if (!name) return;
  if (G.players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
    inp.select(); return;
  }
  G.players.push({ name, score: 0 });
  inp.value = '';
  inp.focus();
  renderPlayerList();
  checkStart();
}

function removePlayer(i) {
  G.players.splice(i, 1);
  renderPlayerList();
  checkStart();
}

function renderPlayerList() {
  el('player-list').innerHTML = G.players.map((p, i) => `
    <div class="player-chip">
      <span class="chip-name">${esc(p.name)}</span>
      <button class="chip-remove" onclick="removePlayer(${i})" title="Pašalinti">✕</button>
    </div>`).join('');
}

function checkStart() {
  el('btn-start').disabled = G.players.length < 2 || G.songs.length === 0;
}

function startGame() {
  G.winScore  = Math.min(20, Math.max(2, parseInt(el('win-score').value) || 5));
  G.playerIdx = 0;
  G.songIdx   = 0;
  G.round     = 1;
  G.players.forEach(p => p.score = 0);

  const s = [...G.songs];
  for (let i = s.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [s[i], s[j]] = [s[j], s[i]];
  }
  G.songs = s;

  showScreen('game');
  el('sb-label').textContent = `Rezultatai — pirmasis surinkęs ${G.winScore} taškų laimi!`;
  loadRound();
}

/* ══════════════════════════════════════════
   YOUTUBE — direct iframe, timer-based clips
══════════════════════════════════════════ */
let clipTimer = null;

function clearPoll() {
  clearTimeout(clipTimer);
  clipTimer = null;
}

function playSegment(videoId, startSec, endSec, onEnd) {
  clearPoll();
  const frame = el('yt-player');
  frame.onload = null;
  frame.src = `https://www.youtube.com/embed/${videoId}`
            + `?autoplay=1&start=${Math.floor(startSec)}`
            + `&controls=0&rel=0&modestbranding=1&playsinline=1&iv_load_policy=3`;
  frame.onload = () => {
    frame.onload = null;
    clipTimer = setTimeout(() => {
      frame.src = 'about:blank';
      onEnd();
    }, (endSec - startSec) * 1000);
  };
}

/* ══════════════════════════════════════════
   ROUND LIFECYCLE
══════════════════════════════════════════ */
function loadRound() {
  const song   = G.songs[G.songIdx % G.songs.length];
  const player = G.players[G.playerIdx];
  const vid    = extractVid(song.youtubeUrl);

  clearTimeout(clipTimer);
  waitForPlay = null;

  el('song-reveal').style.display = 'none';
  el('lyrics-box').style.display  = 'none';
  el('turn-label').innerHTML = `<span class="pname">${esc(player.name)}</span> žaidžia`;
  el('round-pill').textContent = `Ratas ${G.round}`;
  renderScoreboard();

  if (!vid) {
    setStatus('⚠️ Netinkamas YouTube URL — praleidžiama…');
    setTimeout(advanceSong, 1500);
    return;
  }

  setPhase('clip');
  playSegment(vid, song.clip.startSeconds, song.clip.endSeconds, () => setPhase('timer'));
}

function replayClip() {
  const song = G.songs[G.songIdx % G.songs.length];
  const vid  = extractVid(song.youtubeUrl);
  if (!vid) return;
  setPhase('clip');
  setStatus('🔁 Kartojama ištrauka…');
  playSegment(vid, song.clip.startSeconds, song.clip.endSeconds, () => {
    setPhase('timer');
    clearTimer();
    el('timer-wrap').style.display = 'none';
  });
}

function revealAnswer() {
  const song = G.songs[G.songIdx % G.songs.length];
  const vid  = extractVid(song.youtubeUrl);

  setPhase('revealing');
  el('song-title-el').textContent  = song.title;
  el('song-artist-el').textContent = `Atlikėjas: ${song.artist}`;
  el('song-reveal').style.display  = '';
  el('lyrics-box').textContent     = song.answer.lyrics;
  el('lyrics-box').style.display   = '';

  playSegment(vid, song.answer.startSeconds, song.answer.startSeconds + 7, () => setPhase('judging'));
}

function spawnFloaters(emojis, phrases, isCorrect) {
  const colors = isCorrect
    ? ['rgba(0,180,120,.9)','rgba(131,56,236,.9)','rgba(255,214,10,.92)','rgba(168,255,62,.85)']
    : ['rgba(220,40,70,.9)','rgba(255,120,0,.9)','rgba(131,56,236,.9)'];

  phrases.forEach((text, i) => {
    const s = document.createElement('span');
    s.textContent = text;
    const dur   = (7 + Math.random() * 4).toFixed(1);
    const delay = (i * 0.18 + Math.random() * 0.5).toFixed(2);
    const bg    = colors[Math.floor(Math.random() * colors.length)];
    const fs    = (1 + Math.random() * 0.55).toFixed(1);
    s.style.cssText = `position:fixed;bottom:${(Math.random()*22).toFixed(0)}%;`
      + `left:${(2 + Math.random()*82).toFixed(0)}%;`
      + `font-family:'Fredoka One',cursive;font-size:${fs}rem;letter-spacing:.02em;`
      + `pointer-events:none;z-index:200;opacity:0;white-space:nowrap;`
      + `background:${bg};color:#fff;padding:.22rem .75rem;border-radius:99px;`
      + `box-shadow:0 3px 14px rgba(0,0,0,.35);`
      + `animation:floatText ${dur}s ease-out ${delay}s both;`;
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  });

  for (let i = 0; i < 10; i++) {
    const s = document.createElement('span');
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const dur   = (7 + Math.random() * 4).toFixed(1);
    const delay = (Math.random() * 1.6).toFixed(2);
    const size  = (1.2 + Math.random() * 2).toFixed(1);
    s.style.cssText = `position:fixed;bottom:${(Math.random()*18).toFixed(0)}%;`
      + `left:${(4 + Math.random()*88).toFixed(0)}%;font-size:${size}rem;`
      + `pointer-events:none;z-index:200;opacity:0;`
      + `animation:floatNote ${dur}s linear ${delay}s both;`;
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  }
}

function markAnswer(correct) {
  if (correct) spawnFloaters(
    ['😊','🎉','😄','🥳','✨','🌟','😁','🎊'],
    ['žiaurus','maladec','tu kietas','gyvulys','važiuojam džesika','judi judi','afigenai'],
    true
  );
  else spawnFloaters(
    ['😢','😭','😞','💔','😩','😿','😔'],
    ['ble nu kaip taip','pagarbos galima žaidimui?','susiimk','kas yra?','prastai','liudna','jopapa','nu nx'],
    false
  );

  const p = G.players[G.playerIdx];
  if (correct) p.score++;

  setStatus(correct
    ? `✅ +1 taškas žaidėjui ${p.name}!`
    : `❌ Taškas nepaskirtas ${p.name}.`);

  const winner = checkWinner();

  setPhase(winner ? 'idle' : 'scored');
  renderScoreboard(true);

  if (winner) {
    setTimeout(() => showWinner(winner), 750);
  }
}

function nextRound() {
  G.playerIdx = (G.playerIdx + 1) % G.players.length;
  G.songIdx++;
  if (G.playerIdx === 0) G.round++;
  loadRound();
}

function advanceSong() {
  G.songIdx++;
  loadRound();
}

function checkWinner() {
  const max = Math.max(...G.players.map(p => p.score));
  if (max < G.winScore) return null;
  return G.players.find(p => p.score === max) || null;
}

/* ══════════════════════════════════════════
   TIMER
══════════════════════════════════════════ */
function startTimer() {
  clearTimer();
  G.timerVal = 10;
  el('timer-wrap').style.display = 'block';
  tickTimer();
  G.timerIv = setInterval(() => {
    G.timerVal = Math.max(0, G.timerVal - 1);
    tickTimer();
    if (G.timerVal === 0) {
      clearTimer();
      if (G.phase === 'timer') el('btn-reveal').disabled = false;
    }
  }, 1000);
}

function clearTimer() {
  clearInterval(G.timerIv);
  G.timerIv = null;
}

function tickTimer() {
  const n  = el('timer-num');
  const v  = G.timerVal;
  n.textContent = v;
  n.className = 'timer-num ' +
    (v === 0 ? 't-done' : v <= 3 ? 't-urgent' : v <= 5 ? 't-soon' : 't-go');
}

/* ══════════════════════════════════════════
   SCOREBOARD
══════════════════════════════════════════ */
function renderScoreboard(animate = false) {
  const ranked = G.players
    .map((p, i) => ({ ...p, origIdx: i }))
    .sort((a, b) => b.score - a.score);

  const maxScore = ranked[0]?.score ?? 0;

  el('sb-rows').innerHTML = ranked.map((p, rank) => {
    const leader = p.score === maxScore && maxScore > 0;
    const active = p.origIdx === G.playerIdx;
    const cls    = ['sb-row', leader && 'is-leader', active && 'is-active'].filter(Boolean).join(' ');
    const bump   = animate && active ? 'bumping' : '';
    return `<div class="${cls}">
      <span class="sb-rank">${rank + 1}</span>
      <span class="sb-name">${esc(p.name)}</span>
      <span class="sb-pts ${bump}">${p.score}</span>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   WINNER
══════════════════════════════════════════ */
function showWinner(winner) {
  clearPoll();
  clearTimer();
  try { el('yt-player').src = 'about:blank'; } catch (_) {}

  el('winner-name').textContent = `${winner.name} laimi!`;

  const ranked = [...G.players].sort((a, b) => b.score - a.score);
  el('final-list').innerHTML = ranked.map((p, i) => {
    const isW = p.name === winner.name;
    return `<div class="final-row ${isW ? 'is-winner' : ''}">
      <span class="final-rank">${i + 1}</span>
      <span class="final-name">${esc(p.name)}</span>
      <span class="final-pts">${p.score}</span>
    </div>`;
  }).join('');

  showScreen('winner');
  runConfetti();
}

function playAgain() {
  stopConfetti();
  G.players.forEach(p => p.score = 0);
  showScreen('setup');
  renderPlayerList();
  checkStart();
}

/* ══════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════ */
function runConfetti() {
  const cv = el('confetti');
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const COLORS = ['#8b5cf6','#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#f472b6','#fb923c'];
  const pieces = Array.from({ length: 210 }, () => ({
    x:     Math.random() * cv.width,
    y:     Math.random() * -cv.height * .6,
    w:     Math.random() * 13 + 5,
    h:     Math.random() * 6 + 3,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    speed: Math.random() * 3 + 1.5,
    angle: Math.random() * Math.PI * 2,
    spin:  (Math.random() - .5) * .16,
    drift: (Math.random() - .5) * 1.5,
    alpha: Math.random() * .3 + .7,
  }));
  function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    for (const p of pieces) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      p.y += p.speed; p.x += p.drift; p.angle += p.spin;
      if (p.y > cv.height + 20) { p.y = -20; p.x = Math.random() * cv.width; }
    }
    G.confettiR = requestAnimationFrame(draw);
  }
  draw();
}

function stopConfetti() {
  cancelAnimationFrame(G.confettiR);
  const cv = el('confetti');
  cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
}

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
function el(id) { return document.getElementById(id); }

function setVis(id, show) {
  el(id).style.display = show ? '' : 'none';
}

function setStatus(msg) { el('status-bar').textContent = msg; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  el(id).classList.add('active');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function extractVid(url) {
  for (const p of [
    /[?&]v=([a-zA-Z0-9_-]{11})/,
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /embed\/([a-zA-Z0-9_-]{11})/,
    /shorts\/([a-zA-Z0-9_-]{11})/,
  ]) {
    const m = url?.match(p);
    if (m) return m[1];
  }
  return null;
}

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
loadSongs();
</script>
</body>
</html>
