<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medos Dainų Viktorina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Fredoka+One&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ─────────────────────────────────────── */
    :root {
      --bg:      #0a0a1a;
      --s1:      #12122a;
      --s2:      #1a1a38;
      --pink:    #ff006e;
      --purple:  #8338ec;
      --cyan:    #06d6d6;
      --orange:  #ff8c00;
      --lime:    #a8ff3e;
      --green:   #00c896;
      --red:     #ff3a5c;
      --gold:    #ffd60a;
      --text:    #f0eeff;
      --muted:   #7a7a9a;
      --border:  #2a2a50;
      --r:       16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(160deg, #1e0540 0%, #0d0d2e 35%, #001833 65%, #021a1a 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* vivid colour blobs */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 12% 18%,  rgba(131,56,236,.55) 0%, transparent 60%),
        radial-gradient(ellipse 65% 55% at 88% 78%,  rgba(255,0,110,.45) 0%, transparent 60%),
        radial-gradient(ellipse 55% 48% at 82% 12%,  rgba(6,214,214,.38) 0%, transparent 60%),
        radial-gradient(ellipse 50% 42% at 10% 88%,  rgba(255,140,0,.32) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 50% 50%,  rgba(168,255,62,.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body > * { position: relative; z-index: 1; }

    /* floating musical notes */
    .bg-decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-decor span {
      position: absolute;
      bottom: -80px;
      left: var(--x);
      font-size: var(--s);
      opacity: 0;
      animation: floatNote var(--dur, 9s) linear var(--d) infinite;
      user-select: none;
    }
    @keyframes floatNote {
      0%   { transform: translateY(0) rotate(0deg)   scale(1);   opacity: 0; }
      8%   { opacity: .55; }
      50%  { transform: translateY(-55vh) rotate(180deg) scale(1.1); opacity: .4; }
      92%  { opacity: .3; }
      100% { transform: translateY(-115vh) rotate(360deg) scale(.9); opacity: 0; }
    }
    @keyframes floatText {
      0%   { transform: translateY(0)      scale(1);    opacity: 0; }
      8%   { opacity: 1; }
      90%  { opacity: .85; }
      100% { transform: translateY(-110vh) scale(1.05); opacity: 0; }
    }

    /* ── SCREENS ────────────────────────────────────── */
    .screen { display: none; }
    .screen.active {
      display: block;
      animation: fadeUp .4s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── SHARED ─────────────────────────────────────── */
    .card {
      background: rgba(18,18,42,.85);
      border: 1.5px solid rgba(131,56,236,.35);
      border-radius: var(--r);
      padding: 1.4rem 1.5rem;
      margin-bottom: 1.1rem;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
    }
    .card-label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--cyan);
      margin-bottom: .8rem;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      background: rgba(10,10,26,.8);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: .65rem .9rem;
      font-size: .95rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(131,56,236,.25);
    }

    /* ── BUTTONS ────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      border: none;
      border-radius: 12px;
      font-family: 'Fredoka One', cursive;
      font-weight: 400;
      letter-spacing: .03em;
      cursor: pointer;
      transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s, filter .15s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.03);
      filter: brightness(1.12);
    }
    .btn:active:not(:disabled) { transform: translateY(0) scale(.98); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }

    .btn-accent {
      background: linear-gradient(135deg, var(--purple), #6a00f4);
      color: #fff;
      box-shadow: 0 4px 18px rgba(131,56,236,.45);
    }
    .btn-accent:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(131,56,236,.65); }

    .btn-ghost {
      background: rgba(26,26,56,.9);
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-green {
      background: linear-gradient(135deg, #00a87a, var(--green));
      color: #fff;
      box-shadow: 0 4px 18px rgba(0,200,150,.4);
    }
    .btn-green:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(0,200,150,.6); }

    .btn-red {
      background: linear-gradient(135deg, #cc0033, var(--red));
      color: #fff;
      box-shadow: 0 4px 18px rgba(255,58,92,.4);
    }
    .btn-red:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(255,58,92,.6); }

    .btn-cyan {
      background: linear-gradient(135deg, #0096aa, var(--cyan));
      color: #0a0a1a;
      box-shadow: 0 4px 18px rgba(6,214,214,.4);
    }
    .btn-cyan:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(6,214,214,.6); }

    .btn-sm  { padding: .35rem .8rem;  font-size: .85rem; border-radius: 8px; }
    .btn-md  { padding: .65rem 1.3rem; font-size: 1rem; }
    .btn-lg  { padding: 1rem 1.4rem;   font-size: 1.05rem; width: 100%; border-radius: 14px; }
    .btn-full { width: 100%; }

    /* ── SETUP ──────────────────────────────────────── */
    #setup {
      max-width: 540px;
      margin: 0 auto;
      padding: 2.5rem 1rem 5rem;
    }
    .logo { margin-bottom: 2.5rem; }
    .logo-hero {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: .5rem;
    }
    .logo-text { text-align: left; flex: 1; }
    .logo h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.8rem;
      font-weight: 400;
      background: linear-gradient(90deg, #ff006e, #8338ec, #06d6d6, #ff8c00, #a8ff3e, #ff006e);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbowShift 4s linear infinite;
      text-shadow: none;
      filter: drop-shadow(0 2px 12px rgba(131,56,236,.4));
    }
    @keyframes rainbowShift {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }
    .logo p {
      color: var(--muted);
      margin-top: .4rem;
      font-size: .95rem;
      letter-spacing: .02em;
    }
    .meda-img {
      height: 170px;
      width: auto;
      object-fit: cover;
      object-position: top center;
      flex-shrink: 0;
      border-radius: 14px 14px 0 0;
      filter: saturate(.85) brightness(.92);
      -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%),
                          linear-gradient(to right, transparent 0%, black 18%);
      -webkit-mask-composite: source-in;
      mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      mix-blend-mode: screen;
    }

    .add-row { display: flex; gap: .5rem; margin-bottom: .75rem; }
    .add-row input { flex: 1; }

    .player-list { display: flex; flex-direction: column; gap: .4rem; min-height: 1rem; }
    .player-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, rgba(131,56,236,.2), rgba(6,214,214,.15));
      border: 1.5px solid rgba(131,56,236,.4);
      border-radius: 12px;
      padding: .5rem .85rem;
      font-size: .9rem;
      font-weight: 600;
      animation: popIn .25s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    .chip-name { flex: 1; }
    .chip-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: .1rem .3rem;
      border-radius: 5px;
      transition: color .15s, transform .15s;
      font-family: inherit;
    }
    .chip-remove:hover { color: var(--red); transform: rotate(15deg) scale(1.2); }

    .winscore-row { display: flex; align-items: center; gap: 1rem; }
    .winscore-row label { flex: 1; font-size: .9rem; color: var(--muted); }
    .winscore-row input { width: 80px; text-align: center; }

    .songs-note { text-align:center; font-size:.8rem; color:var(--muted); margin-top:.75rem; }

    /* mode picker */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }
    .mode-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .3rem;
      padding: .9rem .5rem;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: rgba(18,18,42,.7);
      color: var(--text);
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      transition: transform .15s cubic-bezier(.34,1.56,.64,1), border-color .15s, box-shadow .15s;
    }
    .mode-btn .mode-icon { font-size: 1.9rem; }
    .mode-btn:hover { transform: translateY(-3px) scale(1.03); }
    .mode-btn.active-songs {
      border-color: var(--purple);
      background: rgba(131,56,236,.15);
      box-shadow: 0 0 18px rgba(131,56,236,.4);
    }
    .mode-btn.active-qa {
      border-color: var(--orange);
      background: rgba(255,140,0,.15);
      box-shadow: 0 0 18px rgba(255,140,0,.4);
    }

    /* category picker */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .6rem;
    }
    .cat-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .35rem;
      padding: .85rem .5rem;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: rgba(18,18,42,.7);
      color: var(--text);
      font-family: 'Fredoka One', cursive;
      font-size: .95rem;
      cursor: pointer;
      transition: transform .15s cubic-bezier(.34,1.56,.64,1), border-color .15s, background .15s, box-shadow .15s;
    }
    .cat-btn .cat-icon { font-size: 1.8rem; }
    .cat-btn:hover {
      transform: translateY(-3px) scale(1.03);
    }
    .cat-btn.active-lt {
      border-color: #ffd60a;
      background: rgba(255,214,10,.12);
      box-shadow: 0 0 18px rgba(255,214,10,.35);
    }
    .cat-btn.active-world {
      border-color: var(--cyan);
      background: rgba(6,214,214,.12);
      box-shadow: 0 0 18px rgba(6,214,214,.35);
    }
    .cat-btn.active-mix {
      border-color: var(--pink);
      background: rgba(255,0,110,.12);
      box-shadow: 0 0 18px rgba(255,0,110,.35);
    }

    /* ── GAME ───────────────────────────────────────── */
    #game.active { display: flex; flex-direction: column; min-height: 100vh; }
    .game-wrap {
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }

    /* top bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
    }
    .turn-label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: .02em;
    }
    .turn-label .pname {
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(6,214,214,.6);
    }
    .round-pill {
      background: linear-gradient(135deg, rgba(131,56,236,.3), rgba(6,214,214,.2));
      border: 1.5px solid rgba(131,56,236,.5);
      border-radius: 99px;
      padding: .3rem .95rem;
      font-size: .78rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    /* scoreboard */
    .sb {
      background: rgba(18,18,42,.85);
      border: 1.5px solid rgba(131,56,236,.3);
      border-radius: var(--r);
      padding: .9rem 1.1rem;
      backdrop-filter: blur(8px);
    }
    .sb-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--orange);
      margin-bottom: .6rem;
    }
    .sb-rows { display: flex; flex-direction: column; gap: .35rem; }
    .sb-row {
      display: flex;
      align-items: center;
      gap: .55rem;
      padding: .4rem .7rem;
      border-radius: 10px;
      border: 1.5px solid transparent;
      transition: background .25s, border-color .25s;
    }
    .sb-row.is-leader {
      background: rgba(255,214,10,.1);
      border-color: rgba(255,214,10,.3);
    }
    .sb-row.is-active {
      background: rgba(131,56,236,.18);
      border-color: rgba(131,56,236,.45);
    }
    .sb-row.is-leader.is-active {
      background: rgba(131,56,236,.2);
      border-color: rgba(131,56,236,.5);
    }
    .sb-rank { font-size: .75rem; color: var(--muted); width: 18px; text-align: center; flex-shrink: 0; }
    .sb-name { flex: 1; font-size: .88rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sb-pts {
      font-family: 'Fredoka One', cursive;
      font-size: .95rem;
      background: rgba(26,26,56,.9);
      border-radius: 99px;
      min-width: 34px;
      text-align: center;
      padding: .12rem .55rem;
      flex-shrink: 0;
      transition: background .25s, color .25s;
    }
    .sb-row.is-leader .sb-pts { background: var(--gold); color: #111; }
    .sb-row.is-active .sb-pts { background: var(--purple); color: #fff; }
    .sb-row.is-leader.is-active .sb-pts { background: var(--purple); color: #fff; }
    @keyframes bump { 0%,100%{transform:scale(1)} 40%{transform:scale(1.5) rotate(-5deg)} 60%{transform:scale(1.3) rotate(3deg)} }
    .bumping { animation: bump .5s cubic-bezier(.34,1.56,.64,1); }

    /* video */
    .video-wrap {
      position: relative;
      background: #000;
      border-radius: var(--r);
      overflow: hidden;
      border: 2px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 0 0 2px rgba(131,56,236,.6),
        0 0 30px rgba(131,56,236,.3),
        0 0 60px rgba(6,214,214,.15);
    }
    .video-ratio { position: relative; padding-bottom: 56.25%; }
    .video-ratio > * {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .video-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: .9rem;
    }

    /* timer */
    .timer-wrap {
      text-align: center;
      padding: .6rem .4rem;
      display: none;
      background: rgba(18,18,42,.7);
      border-radius: var(--r);
      border: 1.5px solid rgba(131,56,236,.3);
    }
    .timer-lbl {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--cyan);
      margin-bottom: .2rem;
    }
    .timer-num {
      font-family: 'Fredoka One', cursive;
      font-size: 4.5rem;
      line-height: 1;
      transition: color .25s;
    }
    .timer-num.t-go     { color: var(--lime); text-shadow: 0 0 20px rgba(168,255,62,.6); }
    .timer-num.t-soon   { color: var(--orange); text-shadow: 0 0 20px rgba(255,140,0,.6); animation: pulse .6s ease infinite alternate; }
    .timer-num.t-urgent { color: var(--red); text-shadow: 0 0 25px rgba(255,58,92,.8); animation: shakeNum .25s ease infinite; }
    .timer-num.t-done   { color: var(--muted); }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
    @keyframes shakeNum {
      0%,100% { transform: translateX(0) scale(1.05); }
      25%     { transform: translateX(-4px) scale(1.1); }
      75%     { transform: translateX(4px) scale(1.1); }
    }

    /* song reveal */
    .song-reveal {
      text-align: center;
      display: none;
      animation: fadeUp .35s ease both;
      padding: .3rem;
    }
    .song-reveal h3 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(6,214,214,.5);
    }
    .song-reveal p { color: var(--muted); font-size: .88rem; margin-top: .15rem; }

    /* lyrics */
    .lyrics-box {
      background: linear-gradient(135deg, rgba(18,18,42,.9), rgba(26,26,56,.9));
      border: 2px solid var(--purple);
      border-radius: var(--r);
      padding: 1.3rem 1.6rem;
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem;
      font-weight: 400;
      text-align: center;
      line-height: 1.6;
      display: none;
      animation: fadeUp .35s ease both;
      box-shadow: 0 0 20px rgba(131,56,236,.35), inset 0 0 20px rgba(131,56,236,.08);
      color: #fff;
      letter-spacing: .02em;
    }

    /* status */
    .status-bar {
      text-align: center;
      font-size: .88rem;
      color: var(--muted);
      min-height: 1.25rem;
      letter-spacing: .01em;
    }

    /* actions */
    .actions { display: flex; flex-direction: column; gap: .6rem; }
    .btn-pair { display: flex; gap: .6rem; }
    .btn-pair .btn { flex: 1; }
    .btn-center { display: flex; justify-content: center; }
    .btn-center .btn { max-width: 280px; }

    /* ── WINNER ─────────────────────────────────────── */
    #winner.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a0a3a 0%, #0a0a1a 70%);
      z-index: 60;
    }
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 59; }
    .winner-box {
      text-align: center;
      z-index: 61;
      padding: 2rem 1.5rem;
      max-width: 500px;
      width: 100%;
    }
    .winner-trophy {
      font-size: 6rem;
      display: block;
      margin-bottom: .5rem;
      animation: trophyBounce 1s cubic-bezier(.34,1.56,.64,1) both;
      filter: drop-shadow(0 0 20px rgba(255,214,10,.7));
    }
    @keyframes trophyBounce {
      from { opacity: 0; transform: scale(.3) rotate(-20deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .winner-box h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      font-weight: 400;
      background: linear-gradient(135deg, var(--gold), var(--orange), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .3rem;
      filter: drop-shadow(0 2px 12px rgba(255,214,10,.3));
    }
    .winner-sub {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 1.5rem;
    }

    .final-list { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1.8rem; }
    .final-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      background: rgba(18,18,42,.85);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: .65rem 1rem;
    }
    .final-row.is-winner {
      border-color: var(--gold);
      background: rgba(255,214,10,.08);
      box-shadow: 0 0 18px rgba(255,214,10,.2);
    }
    .final-rank { font-size: .78rem; color: var(--muted); width: 20px; flex-shrink: 0; }
    .final-name { flex: 1; font-weight: 600; text-align: left; }
    .final-pts {
      font-family: 'Fredoka One', cursive;
      font-weight: 400;
      font-size: 1.2rem;
      color: var(--purple);
    }
    .final-row.is-winner .final-pts { color: var(--gold); }

    /* ── VIDEO THUMBNAIL ───────────────────────────── */
    .video-thumb {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .video-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: rgba(0,0,0,.45);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: .65rem;
    }
    .video-play-btn {
      background: rgba(131,56,236,.92);
      border: none; border-radius: 50%;
      width: 72px; height: 72px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.9rem; color: #fff;
      transition: transform .15s, background .15s;
      box-shadow: 0 0 20px rgba(131,56,236,.6);
    }
    .video-play-btn:hover { background: var(--purple); transform: scale(1.12); }
    .video-open-tag {
      background: rgba(0,0,0,.6);
      border-radius: 99px;
      padding: .28rem .85rem;
      font-size: .76rem; font-weight: 600; color: var(--text);
    }

    /* tour selector */
    .tour-grid {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .tour-btn {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: rgba(18,18,42,.7);
      color: var(--text);
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      transition: transform .15s cubic-bezier(.34,1.56,.64,1), border-color .15s, box-shadow .15s;
      text-align: left;
    }
    .tour-btn .tour-icon { font-size: 1.5rem; flex-shrink: 0; }
    .tour-btn .tour-info { flex: 1; }
    .tour-btn .tour-name { display: block; }
    .tour-btn .tour-count { font-family: 'Poppins', sans-serif; font-size: .75rem; color: var(--muted); }
    .tour-btn:hover { transform: translateX(4px) scale(1.01); }
    .tour-btn.active-tour {
      border-color: var(--orange);
      background: rgba(255,140,0,.15);
      box-shadow: 0 0 18px rgba(255,140,0,.3);
    }

    /* tour badge in game */
    .tour-badge {
      text-align: center;
      font-family: 'Fredoka One', cursive;
      font-size: .85rem;
      color: var(--orange);
      letter-spacing: .05em;
      padding: .2rem 0;
    }

    /* ── Q&A QUESTION CARD ─────────────────────────── */
    .question-card {
      background: linear-gradient(135deg, rgba(18,18,42,.95), rgba(26,26,56,.95));
      border: 2px solid rgba(255,140,0,.5);
      border-radius: var(--r);
      padding: 1.5rem 1.6rem;
      text-align: center;
      display: none;
      animation: fadeUp .35s ease both;
      box-shadow: 0 0 24px rgba(255,140,0,.2);
    }
    .question-card .q-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--orange);
      margin-bottom: .6rem;
    }
    .question-card .q-text {
      font-family: 'Fredoka One', cursive;
      font-size: 1.35rem;
      line-height: 1.4;
      color: #fff;
    }
    .answers-grid {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: .55rem;
    }
    .answers-grid.answers-3 .ans-btn:last-child {
      grid-column: 1 / -1;
    }
    .ans-btn {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .8rem 1rem;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: rgba(18,18,42,.85);
      color: var(--text);
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      text-align: left;
      cursor: default;
      transition: border-color .3s, background .3s, box-shadow .3s;
    }
    .ans-btn .ans-letter {
      font-size: 1rem;
      font-weight: 700;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(131,56,236,.35);
      flex-shrink: 0;
    }
    .ans-btn.ans-correct {
      border-color: var(--green);
      background: rgba(0,200,150,.18);
      box-shadow: 0 0 20px rgba(0,200,150,.4);
      color: #fff;
    }
    .ans-btn.ans-correct .ans-letter { background: var(--green); }
    .ans-btn.ans-wrong {
      border-color: rgba(255,58,92,.3);
      background: rgba(255,58,92,.06);
      opacity: .5;
    }

    /* true / false special layout */
    .answers-grid.answers-tf {
      grid-template-columns: 1fr 1fr;
    }
    .answers-grid.answers-tf .ans-btn {
      flex-direction: column;
      justify-content: center;
      text-align: center;
      padding: 1.4rem 1rem;
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      gap: .35rem;
    }
    .answers-grid.answers-tf .ans-btn .ans-letter { display: none; }
    .ans-btn.tf-tiesa {
      border-color: rgba(0,200,150,.5);
      background: rgba(0,200,150,.1);
    }
    .ans-btn.tf-melas {
      border-color: rgba(255,58,92,.5);
      background: rgba(255,58,92,.1);
    }
    .ans-btn.tf-tiesa .tf-icon::before { content: '✅'; font-size: 1.8rem; display: block; margin-bottom: .2rem; }
    .ans-btn.tf-melas .tf-icon::before { content: '❌'; font-size: 1.8rem; display: block; margin-bottom: .2rem; }

    /* ── MOBILE ─────────────────────────────────────── */
    @media (max-width: 580px) {
      .logo h1 { font-size: 2.1rem; }
      .winner-box h1 { font-size: 2.1rem; }
      .winner-trophy { font-size: 4rem; }
      .timer-num { font-size: 3.2rem; }
      .topbar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div class="bg-decor" aria-hidden="true">
  <span style="--x:4%;  --d:0s;   --s:1.9rem; --dur:10s">🎵</span>
  <span style="--x:13%; --d:1.5s; --s:1.2rem; --dur:8s">♪</span>
  <span style="--x:24%; --d:3s;   --s:2.2rem; --dur:11s">🎶</span>
  <span style="--x:38%; --d:.8s;  --s:1.5rem; --dur:9s">♫</span>
  <span style="--x:52%; --d:4.5s; --s:2rem;   --dur:12s">🎵</span>
  <span style="--x:63%; --d:2s;   --s:1rem;   --dur:7s">♪</span>
  <span style="--x:74%; --d:5.5s; --s:1.8rem; --dur:10s">🎶</span>
  <span style="--x:86%; --d:.4s;  --s:1.3rem; --dur:9s">♫</span>
  <span style="--x:32%; --d:6.5s; --s:1.1rem; --dur:8s">🎵</span>
  <span style="--x:78%; --d:3.5s; --s:2rem;   --dur:11s">♫</span>
  <span style="--x:47%; --d:7s;   --s:1.4rem; --dur:9s">🎶</span>
  <span style="--x:91%; --d:2.8s; --s:1.7rem; --dur:10s">🎵</span>
</div>

<!-- ════════════════ SETUP ════════════════ -->
<div id="setup" class="screen active">
  <div style="max-width:540px;margin:0 auto;padding:2.5rem 1rem 5rem">
    <div class="logo">
      <div class="logo-hero">
        <div class="logo-text">
          <h1>🎵 Medos Dainų Viktorina</h1>
          <p>Ar atspėsi, kas dainuojama toliau?</p>
        </div>
        <img src="meda.png" class="meda-img" alt="Meda" />
      </div>
    </div>

    <div class="card">
      <div class="card-label">Žaidimo rūšis</div>
      <div class="mode-grid">
        <button class="mode-btn active-songs" id="mode-songs" onclick="selectMode('songs')">
          <span class="mode-icon">🎵</span>Dainų viktorina
        </button>
        <button class="mode-btn" id="mode-qa" onclick="selectMode('qa')">
          <span class="mode-icon">❓</span>Klausimai ir atsakymai
        </button>
      </div>
    </div>

    <div class="card" id="tour-card" style="display:none">
      <div class="card-label">Turas</div>
      <div class="tour-grid" id="tour-grid"></div>
    </div>

    <div class="card" id="cat-card">
      <div class="card-label">Kategorija</div>
      <div class="cat-grid">
        <button class="cat-btn active-lt" id="cat-lt" onclick="selectCat('lt')">
          <span class="cat-icon">🇱🇹</span>Lietuviškos dainos
        </button>
        <button class="cat-btn" id="cat-world" onclick="selectCat('world')">
          <span class="cat-icon">🌍</span>Pasaulinės dainos
        </button>
        <button class="cat-btn" id="cat-mix" onclick="selectCat('mix')">
          <span class="cat-icon">🎲</span>MIX
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Pridėti žaidėjus (min. 2)</div>
      <div class="add-row">
        <input type="text" id="name-input" placeholder="Žaidėjo vardas…" maxlength="24" autocomplete="off" />
        <button class="btn btn-accent btn-md" onclick="addPlayer()">Pridėti</button>
      </div>
      <div class="player-list" id="player-list"></div>
    </div>

    <div class="card">
      <div class="card-label">Pergalės sąlyga</div>
      <div class="winscore-row">
        <label for="win-score">Pirmasis surinkęs šį balų skaičių laimi:</label>
        <input type="number" id="win-score" value="5" min="2" max="20" />
      </div>
    </div>

    <button class="btn btn-accent btn-lg btn-full" id="btn-start" onclick="startGame()" disabled>
      ▶ Pradėti žaidimą
    </button>
    <p class="songs-note" id="songs-note">Kraunamos dainos…</p>
  </div>
</div>

<!-- ════════════════ GAME ════════════════ -->
<div id="game" class="screen">
  <div class="game-wrap">

    <div class="topbar">
      <div class="turn-label" id="turn-label">…</div>
      <div class="round-pill" id="round-pill">Ratas 1</div>
    </div>

    <div class="sb">
      <div class="sb-label" id="sb-label">Rezultatai</div>
      <div class="sb-rows" id="sb-rows"></div>
    </div>

    <div class="video-wrap">
      <div class="video-ratio">
        <iframe id="yt-player" src="about:blank" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
    </div>

    <div class="tour-badge" id="tour-badge" style="display:none"></div>

    <div class="question-card" id="question-card">
      <div class="q-label" id="q-label">Klausimas</div>
      <div class="q-text" id="q-text"></div>
    </div>

    <div class="answers-grid" id="answers-grid"></div>

    <div class="timer-wrap" id="timer-wrap">
      <div class="timer-lbl">Laikas spėti!</div>
      <div class="timer-num t-go" id="timer-num">10</div>
    </div>

    <div class="song-reveal" id="song-reveal">
      <h3 id="song-title-el"></h3>
      <p id="song-artist-el"></p>
    </div>

    <div class="lyrics-box" id="lyrics-box"></div>

    <div class="status-bar" id="status-bar">Preparing…</div>

    <div class="actions">
      <!-- Step 1+2: replay / reveal -->
      <div class="btn-pair" id="row-rr">
        <button class="btn btn-ghost btn-lg" id="btn-replay" onclick="replayClip()" style="display:none">🔁 Pakartoti</button>
        <button class="btn btn-cyan  btn-lg" id="btn-reveal" onclick="revealAnswer()" style="display:none" disabled>🎵 Atskleisti atsakymą</button>
      </div>
      <!-- Step 4: judge -->
      <div class="btn-pair" id="row-judge" style="display:none">
        <button class="btn btn-green btn-lg" onclick="markAnswer(true)">Teisingai ✅</button>
        <button class="btn btn-red   btn-lg" onclick="markAnswer(false)">Neteisingai ❌</button>
      </div>
      <!-- Step 5: next -->
      <div class="btn-center" id="row-next" style="display:none">
        <button class="btn btn-accent btn-lg" onclick="nextRound()">Kitas ratas →</button>
      </div>
      <!-- Skip: always during clip/timer -->
      <div class="btn-center" id="row-skip" style="display:none">
        <button class="btn btn-ghost btn-md" onclick="skipSong()">⏭ Praleisti dainą</button>
      </div>

  </div>
</div>

<!-- ════════════════ WINNER ════════════════ -->
<div id="winner" class="screen">
  <canvas id="confetti"></canvas>
  <div class="winner-box">
    <span class="winner-trophy">🏆</span>
    <h1 id="winner-name">Žaidėjas laimi!</h1>
    <p class="winner-sub">Nuostabus pasirodymas!</p>
    <div class="final-list" id="final-list"></div>
    <button class="btn btn-accent btn-lg" style="max-width:240px;margin:0 auto" onclick="playAgain()">Žaisti dar kartą</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════ */
const G = {
  allSongs:   [],
  songs:      [],
  allTours:   [],
  tourId:     null,
  questions:  [],
  players:    [],
  playerIdx:  0,
  songIdx:    0,
  round:      1,
  winScore:   5,
  category:   'lt',
  mode:       'songs',
  phase:      'idle',
  timerVal:   10,
  timerIv:    null,
  confettiR:  null,
};

/* ── PHASE CONFIG ──────────────────────── */
const PHASES = {
  idle:        { replay:false, reveal:false, skip:false, judge:false, next:false, timer:false },
  clip:        { replay:true,  reveal:false, skip:true,  judge:false, next:false, timer:false },
  timer:       { replay:true,  reveal:true,  skip:true,  judge:false, next:false, timer:true  },
  revealing:   { replay:false, reveal:false, skip:false, judge:false, next:false, timer:false },
  judging:     { replay:false, reveal:false, skip:false, judge:true,  next:false, timer:false },
  scored:      { replay:false, reveal:false, skip:false, judge:false, next:true,  timer:false },
  'qa-question':{ replay:false, reveal:true,  skip:false, judge:false, next:false, timer:true  },
};

function setPhase(p) {
  G.phase = p;
  const cfg = PHASES[p] || PHASES.idle;

  if (cfg.timer) {
    startTimer();
  } else {
    clearTimer();
    el('timer-wrap').style.display = 'none';
  }

  setVis('btn-replay', cfg.replay);
  setVis('btn-reveal', cfg.reveal);
  el('btn-reveal').disabled = !cfg.reveal;
  setVis('row-judge', cfg.judge);
  setVis('row-next',  cfg.next);
  setVis('row-skip',  cfg.skip);

  const msgs = {
    clip:          '🎵 Klausyk atidžiai…',
    timer:         '💭 Kokie dainos žodžiai toliau?',
    revealing:     '▶ Klausyk teisingo atsakymo…',
    judging:       'Vedėjas: ar atsakymas teisingas?',
    'qa-question': '❓ Perskaityk klausimą ir lauk atsakymų!',
  };
  if (msgs[p]) setStatus(msgs[p]);
}

/* ══════════════════════════════════════════
   SETUP SCREEN
══════════════════════════════════════════ */
async function loadSongs() {
  try {
    const [sr, qr] = await Promise.all([fetch('songs.json'), fetch('questions.json')]);
    G.allSongs = sr.ok ? await sr.json() : [];
    G.allTours = qr.ok ? await qr.json() : [];
    if (G.allTours.length) {
      G.tourId = G.allTours[0].id;
      renderTourGrid();
    }
    updateSongNote();
    checkStart();
  } catch (e) {
    el('songs-note').textContent = `⚠️ Nepavyko įkelti duomenų (${e.message})`;
  }
}

function renderTourGrid() {
  el('tour-grid').innerHTML = G.allTours.map(t => {
    const active = t.id === G.tourId ? ' active-tour' : '';
    return `<button class="tour-btn${active}" onclick="selectTour('${t.id}')">
      <span class="tour-icon">${t.emoji || '❓'}</span>
      <span class="tour-info">
        <span class="tour-name">${esc(t.name)}</span>
        <span class="tour-count">${t.questions.length} klausimai</span>
      </span>
    </button>`;
  }).join('');
}

function selectTour(id) {
  G.tourId = id;
  renderTourGrid();
  updateSongNote();
  checkStart();
}

function selectMode(mode) {
  G.mode = mode;
  el('mode-songs').className = 'mode-btn' + (mode === 'songs' ? ' active-songs' : '');
  el('mode-qa').className    = 'mode-btn' + (mode === 'qa'    ? ' active-qa'    : '');
  el('cat-card').style.display  = mode === 'songs' ? '' : 'none';
  el('tour-card').style.display = mode === 'qa'    ? '' : 'none';
  updateSongNote();
  checkStart();
}

function selectCat(cat) {
  G.category = cat;
  ['lt','world','mix'].forEach(c => {
    const btn = el('cat-' + c);
    btn.className = 'cat-btn' + (c === cat ? ' active-' + c : '');
  });
  updateSongNote();
  checkStart();
}

function updateSongNote() {
  if (G.mode === 'qa') {
    const tour = G.allTours.find(t => t.id === G.tourId);
    const count = tour ? tour.questions.length : 0;
    el('songs-note').textContent = `✅ ${count} klausimų paruošta`;
  } else {
    el('songs-note').textContent = `✅ ${filteredSongs().length} dainų paruošta`;
  }
}

function filteredSongs() {
  if (G.category === 'mix') return G.allSongs;
  return G.allSongs.filter(s => s.category === G.category);
}

el('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

function addPlayer() {
  const inp = el('name-input');
  const name = inp.value.trim();
  if (!name) return;
  if (G.players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
    inp.select(); return;
  }
  G.players.push({ name, score: 0 });
  inp.value = '';
  inp.focus();
  renderPlayerList();
  checkStart();
}

function removePlayer(i) {
  G.players.splice(i, 1);
  renderPlayerList();
  checkStart();
}

function renderPlayerList() {
  el('player-list').innerHTML = G.players.map((p, i) => `
    <div class="player-chip">
      <span class="chip-name">${esc(p.name)}</span>
      <button class="chip-remove" onclick="removePlayer(${i})" title="Pašalinti">✕</button>
    </div>`).join('');
}

function checkStart() {
  let ready;
  if (G.mode === 'qa') {
    const tour = G.allTours.find(t => t.id === G.tourId);
    ready = tour && tour.questions.length > 0;
  } else {
    ready = filteredSongs().length > 0;
  }
  el('btn-start').disabled = G.players.length < 2 || !ready;
}

function startGame() {
  G.winScore  = Math.min(20, Math.max(2, parseInt(el('win-score').value) || 5));
  G.playerIdx = 0;
  G.songIdx   = 0;
  G.round     = 1;
  G.players.forEach(p => p.score = 0);

  let pool;
  if (G.mode === 'qa') {
    const tour = G.allTours.find(t => t.id === G.tourId) || G.allTours[0];
    pool = [...(tour ? tour.questions : [])];
  } else {
    pool = [...filteredSongs()];
  }
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  if (G.mode === 'qa') { G.questions = pool; G.songs = []; }
  else                 { G.songs = pool; G.questions = []; }

  showScreen('game');
  el('sb-label').textContent = `Rezultatai — pirmasis surinkęs ${G.winScore} taškų laimi!`;
  loadRound();
}

/* ══════════════════════════════════════════
   YOUTUBE — direct iframe, timer-based clips
══════════════════════════════════════════ */
let clipTimer = null;

function clearPoll() {
  clearTimeout(clipTimer);
  clipTimer = null;
}

function playSegment(videoId, startSec, endSec, onEnd) {
  clearPoll();
  const frame = el('yt-player');
  frame.onload = null;
  frame.src = `https://www.youtube.com/embed/${videoId}`
            + `?autoplay=1&start=${Math.floor(startSec)}`
            + `&controls=0&rel=0&modestbranding=1&playsinline=1&iv_load_policy=3`;
  frame.onload = () => {
    frame.onload = null;
    clipTimer = setTimeout(() => {
      frame.src = 'about:blank';
      onEnd();
    }, (endSec - startSec) * 1000);
  };
}

/* ══════════════════════════════════════════
   ROUND LIFECYCLE
══════════════════════════════════════════ */
function loadRound() {
  if (G.mode === 'qa') { loadQARound(); return; }

  const song   = G.songs[G.songIdx % G.songs.length];
  const player = G.players[G.playerIdx];
  const vid    = extractVid(song.youtubeUrl);

  clearTimeout(clipTimer);

  el('song-reveal').style.display   = 'none';
  el('lyrics-box').style.display    = 'none';
  el('question-card').style.display = 'none';
  el('answers-grid').style.display  = 'none';
  el('tour-badge').style.display    = 'none';
  el('video-wrap').style.display    = '';
  el('btn-reveal').textContent      = '🎵 Atskleisti atsakymą';
  el('turn-label').innerHTML = `<span class="pname">${esc(player.name)}</span> žaidžia`;
  el('round-pill').textContent = `Ratas ${G.round}`;
  renderScoreboard();

  if (!vid) {
    setStatus('⚠️ Netinkamas YouTube URL — praleidžiama…');
    setTimeout(advanceSong, 1500);
    return;
  }

  setPhase('clip');
  playSegment(vid, song.clip.startSeconds, song.clip.endSeconds, () => setPhase('timer'));
}

function loadQARound() {
  const q      = G.questions[G.songIdx % G.questions.length];
  const player = G.players[G.playerIdx];
  const tour   = G.allTours.find(t => t.id === G.tourId);

  el('video-wrap').style.display    = 'none';
  el('song-reveal').style.display   = 'none';
  el('lyrics-box').style.display    = 'none';
  el('question-card').style.display = '';
  el('answers-grid').style.display  = 'grid';
  el('turn-label').innerHTML = `<span class="pname">${esc(player.name)}</span> žaidžia`;
  el('round-pill').textContent = `Ratas ${G.round}`;
  renderScoreboard();

  if (tour) {
    el('tour-badge').textContent = `${tour.emoji || '❓'} ${tour.name} — ${G.songIdx % G.questions.length + 1} / ${G.questions.length}`;
    el('tour-badge').style.display = '';
  }

  el('q-label').textContent = `Klausimas ${G.songIdx % G.questions.length + 1}`;
  el('q-text').textContent  = q.question;

  const grid = el('answers-grid');
  if (tour && tour.type === 'truefalse') {
    grid.className = 'answers-grid answers-tf';
    grid.innerHTML =
      `<div class="ans-btn tf-tiesa" id="ans-0"><span class="tf-icon"></span>Tiesa</div>
       <div class="ans-btn tf-melas"  id="ans-1"><span class="tf-icon"></span>Melas</div>`;
  } else {
    const letters = ['A', 'B', 'C', 'D'];
    grid.className = `answers-grid answers-${q.answers.length}`;
    grid.innerHTML = q.answers.map((a, i) =>
      `<div class="ans-btn" id="ans-${i}">
        <span class="ans-letter">${letters[i]}</span>${esc(a)}
      </div>`
    ).join('');
  }

  el('btn-reveal').textContent = '✅ Atskleisti atsakymą';
  setPhase('qa-question');
  setStatus('💭 Žaidėjai spėja atsakymą…');
}

function revealQAnswer() {
  const q    = G.questions[G.songIdx % G.questions.length];
  const tour = G.allTours.find(t => t.id === G.tourId);
  const isTF = tour && tour.type === 'truefalse';

  const count = isTF ? 2 : q.answers.length;
  for (let i = 0; i < count; i++) {
    const btn = el('ans-' + i);
    if (btn) {
      if (i === q.correct) btn.classList.add('ans-correct');
      else                  btn.classList.add('ans-wrong');
    }
  }

  const correctLabel = isTF
    ? (q.correct === 0 ? 'Tiesa ✅' : 'Melas ❌')
    : `${['A','B','C','D'][q.correct]} — ${q.answers[q.correct]}`;

  spawnFloaters(['✨','🎉','😮','🤯','😲'],['OMG','žinai mane!','tiksliai!','šokiruota','wow'], true);

  setPhase('judging');
  setStatus(`Teisingas atsakymas: ${correctLabel}`);
}

function replayClip() {
  const song = G.songs[G.songIdx % G.songs.length];
  const vid  = extractVid(song.youtubeUrl);
  if (!vid) return;
  setPhase('clip');
  setStatus('🔁 Kartojama ištrauka…');
  playSegment(vid, song.clip.startSeconds, song.clip.endSeconds, () => {
    setPhase('timer');
    clearTimer();
    el('timer-wrap').style.display = 'none';
  });
}

function revealAnswer() {
  if (G.mode === 'qa') { revealQAnswer(); return; }
  const song = G.songs[G.songIdx % G.songs.length];
  const vid  = extractVid(song.youtubeUrl);

  setPhase('revealing');
  el('song-title-el').textContent  = song.title;
  el('song-artist-el').textContent = `Atlikėjas: ${song.artist}`;
  el('song-reveal').style.display  = '';
  el('lyrics-box').textContent     = song.answer.lyrics;
  el('lyrics-box').style.display   = '';

  playSegment(vid, song.answer.startSeconds, song.answer.startSeconds + 7, () => setPhase('judging'));
}

function spawnFloaters(emojis, phrases, isCorrect) {
  const colors = isCorrect
    ? ['rgba(0,180,120,.9)','rgba(131,56,236,.9)','rgba(255,214,10,.92)','rgba(168,255,62,.85)']
    : ['rgba(220,40,70,.9)','rgba(255,120,0,.9)','rgba(131,56,236,.9)'];

  phrases.forEach((text, i) => {
    const s = document.createElement('span');
    s.textContent = text;
    const dur   = (7 + Math.random() * 4).toFixed(1);
    const delay = (i * 0.18 + Math.random() * 0.5).toFixed(2);
    const bg    = colors[Math.floor(Math.random() * colors.length)];
    const fs    = (1 + Math.random() * 0.55).toFixed(1);
    s.style.cssText = `position:fixed;bottom:${(Math.random()*22).toFixed(0)}%;`
      + `left:${(2 + Math.random()*82).toFixed(0)}%;`
      + `font-family:'Fredoka One',cursive;font-size:${fs}rem;letter-spacing:.02em;`
      + `pointer-events:none;z-index:200;opacity:0;white-space:nowrap;`
      + `background:${bg};color:#fff;padding:.22rem .75rem;border-radius:99px;`
      + `box-shadow:0 3px 14px rgba(0,0,0,.35);`
      + `animation:floatText ${dur}s ease-out ${delay}s both;`;
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  });

  for (let i = 0; i < 10; i++) {
    const s = document.createElement('span');
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const dur   = (7 + Math.random() * 4).toFixed(1);
    const delay = (Math.random() * 1.6).toFixed(2);
    const size  = (1.2 + Math.random() * 2).toFixed(1);
    s.style.cssText = `position:fixed;bottom:${(Math.random()*18).toFixed(0)}%;`
      + `left:${(4 + Math.random()*88).toFixed(0)}%;font-size:${size}rem;`
      + `pointer-events:none;z-index:200;opacity:0;`
      + `animation:floatNote ${dur}s linear ${delay}s both;`;
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  }
}

function markAnswer(correct) {
  if (correct) spawnFloaters(
    ['😊','🎉','😄','🥳','✨','🌟','😁','🎊'],
    ['žiaurus','maladec','tu kietas','gyvulys','važiuojam džesika','judi judi','afigenai'],
    true
  );
  else spawnFloaters(
    ['😢','😭','😞','💔','😩','😿','😔'],
    ['ble nu kaip taip','pagarbos galima žaidimui?','susiimk','kas yra?','prastai','liudna','jopapa','nu nx'],
    false
  );

  const p = G.players[G.playerIdx];
  if (correct) p.score++;

  setStatus(correct
    ? `✅ +1 taškas žaidėjui ${p.name}!`
    : `❌ Taškas nepaskirtas ${p.name}.`);

  const winner = checkWinner();

  setPhase(winner ? 'idle' : 'scored');
  renderScoreboard(true);

  if (winner) {
    setTimeout(() => showWinner(winner), 750);
  }
}

function nextRound() {
  G.playerIdx = (G.playerIdx + 1) % G.players.length;
  G.songIdx++;
  if (G.playerIdx === 0) G.round++;
  loadRound();
}

function advanceSong() {
  G.songIdx++;
  loadRound();
}

function skipSong() {
  if (G.mode !== 'songs') return;
  clearPoll();
  clearTimer();
  try { el('yt-player').src = 'about:blank'; } catch(_) {}
  G.songIdx++;
  setStatus('⏭ Daina praleista — kita daina tam pačiam žaidėjui…');
  loadRound();
}

function checkWinner() {
  const max = Math.max(...G.players.map(p => p.score));
  if (max < G.winScore) return null;
  return G.players.find(p => p.score === max) || null;
}

/* ══════════════════════════════════════════
   TIMER
══════════════════════════════════════════ */
function startTimer() {
  clearTimer();
  G.timerVal = 10;
  el('timer-wrap').style.display = 'block';
  tickTimer();
  G.timerIv = setInterval(() => {
    G.timerVal = Math.max(0, G.timerVal - 1);
    tickTimer();
    if (G.timerVal === 0) {
      clearTimer();
      if (G.phase === 'timer') el('btn-reveal').disabled = false;
    }
  }, 1000);
}

function clearTimer() {
  clearInterval(G.timerIv);
  G.timerIv = null;
}

function tickTimer() {
  const n  = el('timer-num');
  const v  = G.timerVal;
  n.textContent = v;
  n.className = 'timer-num ' +
    (v === 0 ? 't-done' : v <= 3 ? 't-urgent' : v <= 5 ? 't-soon' : 't-go');
}

/* ══════════════════════════════════════════
   SCOREBOARD
══════════════════════════════════════════ */
function renderScoreboard(animate = false) {
  const ranked = G.players
    .map((p, i) => ({ ...p, origIdx: i }))
    .sort((a, b) => b.score - a.score);

  const maxScore = ranked[0]?.score ?? 0;

  el('sb-rows').innerHTML = ranked.map((p, rank) => {
    const leader = p.score === maxScore && maxScore > 0;
    const active = p.origIdx === G.playerIdx;
    const cls    = ['sb-row', leader && 'is-leader', active && 'is-active'].filter(Boolean).join(' ');
    const bump   = animate && active ? 'bumping' : '';
    return `<div class="${cls}">
      <span class="sb-rank">${rank + 1}</span>
      <span class="sb-name">${esc(p.name)}</span>
      <span class="sb-pts ${bump}">${p.score}</span>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   WINNER
══════════════════════════════════════════ */
function showWinner(winner) {
  clearPoll();
  clearTimer();
  try { el('yt-player').src = 'about:blank'; } catch (_) {}

  el('winner-name').textContent = `${winner.name} laimi!`;

  const ranked = [...G.players].sort((a, b) => b.score - a.score);
  el('final-list').innerHTML = ranked.map((p, i) => {
    const isW = p.name === winner.name;
    return `<div class="final-row ${isW ? 'is-winner' : ''}">
      <span class="final-rank">${i + 1}</span>
      <span class="final-name">${esc(p.name)}</span>
      <span class="final-pts">${p.score}</span>
    </div>`;
  }).join('');

  showScreen('winner');
  runConfetti();
}

function playAgain() {
  stopConfetti();
  G.players.forEach(p => p.score = 0);
  showScreen('setup');
  renderPlayerList();
  checkStart();
}

/* ══════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════ */
function runConfetti() {
  const cv = el('confetti');
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const COLORS = ['#8b5cf6','#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#f472b6','#fb923c'];
  const pieces = Array.from({ length: 210 }, () => ({
    x:     Math.random() * cv.width,
    y:     Math.random() * -cv.height * .6,
    w:     Math.random() * 13 + 5,
    h:     Math.random() * 6 + 3,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    speed: Math.random() * 3 + 1.5,
    angle: Math.random() * Math.PI * 2,
    spin:  (Math.random() - .5) * .16,
    drift: (Math.random() - .5) * 1.5,
    alpha: Math.random() * .3 + .7,
  }));
  function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    for (const p of pieces) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      p.y += p.speed; p.x += p.drift; p.angle += p.spin;
      if (p.y > cv.height + 20) { p.y = -20; p.x = Math.random() * cv.width; }
    }
    G.confettiR = requestAnimationFrame(draw);
  }
  draw();
}

function stopConfetti() {
  cancelAnimationFrame(G.confettiR);
  const cv = el('confetti');
  cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
}

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
function el(id) { return document.getElementById(id); }

function setVis(id, show) {
  el(id).style.display = show ? '' : 'none';
}

function setStatus(msg) { el('status-bar').textContent = msg; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  el(id).classList.add('active');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function extractVid(url) {
  for (const p of [
    /[?&]v=([a-zA-Z0-9_-]{11})/,
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /embed\/([a-zA-Z0-9_-]{11})/,
    /shorts\/([a-zA-Z0-9_-]{11})/,
  ]) {
    const m = url?.match(p);
    if (m) return m[1];
  }
  return null;
}

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
loadSongs();
</script>
